function useIsMobile() {
  const [m,setM] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setM(window.innerWidth < 768);
    window.addEventListener("resize",fn);
    return () => window.removeEventListener("resize",fn);
  },[]);
  return m;
}

function Wave({from,to}) {
  return (
    <div style={{lineHeight:0,overflow:"hidden",background:from}}>
      <svg viewBox="0 0 1440 60" style={{display:"block",width:"100%"}}>
        <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={to} />
      </svg>
    </div>
  );
}

function WL({color,w}) {
  return (
    <svg viewBox="0 0 200 12" style={{display:"block",width:w||50,marginBottom:10}}>

}

      <Nav page={page} go={go} />
      <main style={{flex:1}}>{pages[page]||pages.home}</main>
      <Footer go={go} />

  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
