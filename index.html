function useIsMobile() {
  const [m,setM] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setM(window.innerWidth < 768);
    window.addEventListener("resize",fn);
    return () => window.removeEventListener("resize",fn);
  },[]);
  return m;
}

function Wave({from,to}) {
  return (
    <div style={{lineHeight:0,overflow:"hidden",background:from}}>
      <svg viewBox="0 0 1440 60" style={{display:"block",width:"100%"}}>
        <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={to} />
      </svg>
    </div>
  );
}

function WL({color,w}) {
  return (
    <svg viewBox="0 0 200 12" style={{display:"block",width:w||50,marginBottom:10}}>
      <path d="M0,6 C20,0 40,12 60,6 C80,0 100,12 120,6 C140,0 160,12 180,6 C190,2 196,4 200,6" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>

}

function Block({b}) {
  const mob = useIsMobile();
  if(b.t==="i") return <p style={{fontSize:mob?"0.95rem":"1rem",lineHeight:1.9,color:S.mid,marginBottom:"1.5rem",fontStyle:"italic",borderLeft:"3px solid "+S.sageLight,paddingLeft:"1.2rem"}}>{b.x}</p>;
  if(b.t==="p") return <p style={{fontSize:"0.92rem",lineHeight:1.85,color:S.charcoal,marginBottom:"1.2rem"}}>{b.x}</p>;
  if(b.t==="h2") return <h2 style={{fontFamily:"Georgia,serif",fontSize:mob?"1.3rem":"1.5rem",fontWeight:"bold",color:S.sageDeep,margin:"2rem 0 0.8rem",paddingBottom:"0.5rem",borderBottom:"2px solid "+S.light}}>{b.x}</h2>;
  if(b.t==="q") return (
    <div style={{background:S.salmonPale,borderLeft:"4px solid "+S.salmon,padding:"1.2rem 1.5rem",margin:"1.5rem 0",borderRadius:"0 12px 12px 0"}}>
      <p style={{fontFamily:"Georgia,serif",fontSize:mob?"1rem":"1.1rem",fontStyle:"italic",color:"#8A4030",lineHeight:1.6,margin:0}}>{b.x}</p>
    </div>
  );
  if(b.t==="bl") return (
    <ul style={{listStyle:"none",padding:0,margin:"0.8rem 0 1.2rem"}}>
      {b.x.map((item,i) => (
        <li key={i} style={{display:"flex",gap:"0.7rem",alignItems:"flex-start",marginBottom:"0.6rem",fontSize:"0.9rem",color:S.charcoal,lineHeight:1.7}}>
          <span style={{color:S.salmon,fontWeight:700,flexShrink:0}}>-</span>
          <span>{item}</span>
        </li>
      ))}
    </ul>
  );
  return null;
}
