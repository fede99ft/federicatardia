<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Federica Tardia — Biologa Nutrizionista</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:Georgia,serif;background:#FAFAF7;color:#1C1C1A;overflow-x:hidden}
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const C = {
      sage:       "#8AAF8E",
      sageDark:   "#5E8A63",
      sageDeep:   "#3A6140",
      sageLight:  "#B5CDB8",
      sagePale:   "#EAF2EB",
      sageFog:    "#F3F8F3",
      salmon:     "#E8836A",
      salmonDark: "#C9604A",
      salmonLight:"#F4A99A",
      salmonPale: "#FDF0ED",
      salmonFog:  "#FEF7F5",
      cream:      "#FAFAF7",
      white:      "#FFFFFF",
      charcoal:   "#1C1C1A",
      mid:        "#5A6B5C",
      light:      "#DDEADD",
    };

    const ebooks = [
      { id:1, emoji:"🍱", title:"La Schischetta Perfetta",   sub:"30 ricette · Meal prep",   price:"€ 40",  tag:"Bestseller", tagColor:C.salmonDark, bg:`linear-gradient(135deg,#3A6140,#5E8A63)`, desc:"30 ricette bilanciate per chi porta il pranzo in ufficio. Veloci, buone fredde, sane.", accent:C.sageDark },
      { id:2, emoji:"💪", title:"Nutrizione Sportiva",       sub:"Guida completa",            price:"€ 29",  bg:`linear-gradient(135deg,${C.salmonDark},${C.salmon})`, desc:"Come alimentarsi per migliorare le performance sportive. Basato su evidenze scientifiche.", accent:C.salmon },
      { id:3, emoji:"🏷️", title:"Etichette Alimentari",      sub:"Guida pratica",             price:"€ 19",  bg:`linear-gradient(135deg,#5E8A63,${C.sage})`, desc:"Impara a leggere e interpretare le etichette dei prodotti alimentari.", accent:C.sageDark },
      { id:4, emoji:"👶", title:"Svezzamento 0–12 mesi",     sub:"Per i genitori",            price:"€ 25",  bg:`linear-gradient(135deg,#C96A7A,#E89AAA)`, desc:"Guida completa allo svezzamento: quando iniziare, cosa dare, come procedere.", accent:"#C96A7A" },
      { id:5, emoji:"🧒", title:"Alimentazione Bambini",     sub:"1–10 anni",                 price:"€ 25",  bg:`linear-gradient(135deg,#3A6140,#8AAF8E)`, desc:"Tutto ciò che un genitore deve sapere sull'alimentazione in età prescolare.", accent:C.sageDark },
      { id:6, emoji:"🏃", title:"Alimentazione Adolescenti", sub:"11–17 anni",                price:"€ 25",  bg:`linear-gradient(135deg,${C.salmonDark},#D4826A)`, desc:"Come supportare la crescita degli adolescenti con un'alimentazione bilanciata.", accent:C.salmon },
      { id:7, emoji:"🏢", title:"Mangiare Bene Fuori Casa",  sub:"Per i lavoratori",          price:"€ 19",  bg:`linear-gradient(135deg,#5E8A63,#B5CDB8)`, desc:"Strategie per chi non ha tempo di cucinare ma vuole mangiare sano.", accent:C.sageDark },
      { id:8, emoji:"🥗", title:"15 Ricette Esclusive",      sub:"Omaggio gratuito",          price:"Gratis",tag:"Gratis", tagColor:C.sageDark, bg:`linear-gradient(135deg,${C.salmon},${C.salmonLight})`, desc:"Commenta RICETTARIO su Instagram e ricevi 15 ricette esclusive.", accent:C.salmon },
    ];

    const posts = [
      { emoji:"🥗", cat:"Meal prep",             title:"Come organizzare il meal prep in 60 minuti",      excerpt:"Con il metodo giusto, bastano 60 minuti per avere i pranzi pronti per tutta la settimana.", date:"12 Mar 2026", read:"5 min", featured:true },
      { emoji:"💪", cat:"Sport & Nutrizione",    title:"Proteine: quante ne servono davvero?",              excerpt:"La verità scientifica sui fabbisogni proteici, senza esagerazioni e senza miti.", date:"5 Mar 2026", read:"4 min" },
      { emoji:"🏷️", cat:"Educazione alimentare", title:"Come leggere le etichette senza confondersi",      excerpt:"Tutto quello che c'è scritto in etichetta e come interpretarlo semplicemente.", date:"28 Feb 2026", read:"6 min" },
    ];

    function useIsMobile() {
      const [mob, setMob] = useState(window.innerWidth < 768);
      useEffect(() => {
        const fn = () => setMob(window.innerWidth < 768);
        window.addEventListener("resize", fn);
        return () => window.removeEventListener("resize", fn);
      }, []);
      return mob;
    }

    function Wave({ fromColor, toColor, flip }) {
      return (
        <div style={{ display:"block", lineHeight:0, overflow:"hidden", transform: flip ? "scaleY(-1)" : "none", background: fromColor }}>
          <svg viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" style={{ display:"block", width:"100%" }}>
            <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={toColor} />
          </svg>
        </div>
      );
    }

    function WaveDecor({ color, opacity=0.12 }) {
      return (
        <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" style={{ position:"absolute", bottom:0, left:0, right:0, width:"100%", pointerEvents:"none" }}>
          <path d="M0,40 C100,20 200,60 300,40 C400,20 500,60 600,40 L600,60 L0,60 Z" fill={color} fillOpacity={opacity} />
          <path d="M0,50 C150,30 300,70 450,50 C520,40 570,55 600,50 L600,60 L0,60 Z" fill={color} fillOpacity={opacity * 0.6} />
        </svg>
      );
    }

    function WaveLine({ color, style={} }) {
      return (
        <svg viewBox="0 0 200 12" xmlns="http://www.w3.org/2000/svg" style={{ display:"block", ...style }}>
          <path d="M0,6 C20,0 40,12 60,6 C80,0 100,12 120,6 C140,0 160,12 180,6 C190,2 196,4 200,6" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>
        </svg>
      );
    }

    function Tag({ text, light }) {
      return (
        <div style={{ display:"flex", alignItems:"center", gap:"0.7rem", marginBottom:"0.9rem" }}>
          <WaveLine color={light ? "rgba(255,255,255,0.55)" : C.salmon} style={{ width:"40px" }} />
          <span style={{ fontSize:"0.62rem", fontWeight:700, letterSpacing:"0.16em", textTransform:"uppercase", color: light ? "rgba(255,255,255,0.7)" : C.salmon }}>
            {text}
          </span>
        </div>
      );
    }

    function Btn({ children, onClick, bg, color="#fff", full, small }) {
      const [hov, setHov] = useState(false);
      const bgColor = bg || C.sage;
      return (
        <button onClick={onClick}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            display:"inline-flex", alignItems:"center", justifyContent:"center", gap:"0.4rem",
            padding: small ? "0.6rem 1.1rem" : "0.85rem 1.7rem",
            fontSize: small ? "0.67rem" : "0.72rem", fontWeight:700,
            letterSpacing:"0.09em", textTransform:"uppercase",
            border:"none", cursor:"pointer", borderRadius:"100px",
            background: hov ? bgColor + "dd" : bgColor, color,
            width: full ? "100%" : undefined,
            transition:"all 0.2s",
            boxShadow: hov ? `0 6px 20px ${bgColor}55` : "none",
          }}>
          {children}
        </button>
      );
    }

    function Nav({ page, setPage }) {
      const mob = useIsMobile();
      const [open, setOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => { setOpen(false); }, [page]);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 10);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      const go = (p) => { setPage(p); setOpen(false); window.scrollTo(0,0); };
      const links = [["home","Home"],["chi-sono","Chi sono"],["ebook","eBook"],["blog","Blog"]];

      return (
        <nav style={{
          position:"sticky", top:0, zIndex:200,
          background: scrolled ? "rgba(255,255,255,0.97)" : "rgba(255,255,255,0.93)",
          backdropFilter:"blur(16px)",
          borderBottom:`1px solid ${scrolled ? C.light : "transparent"}`,
          transition:"all 0.3s",
        }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding: mob ? "0 1.2rem" : "0 2.5rem", height: mob ? "58px" : "64px" }}>
            <div onClick={() => go("home")} style={{ fontFamily:"Georgia,serif", fontSize: mob ? "1rem" : "1.12rem", fontWeight:"bold", color:C.sageDeep, cursor:"pointer" }}>
              Federica <span style={{ color:C.salmon, fontStyle:"italic" }}>Tardia</span>
            </div>
            {!mob && (
              <div style={{ display:"flex", gap:"2rem", alignItems:"center" }}>
                {links.map(([k,l]) => (
                  <span key={k} onClick={() => go(k)} style={{
                    fontSize:"0.71rem", fontWeight:600, letterSpacing:"0.09em", textTransform:"uppercase",
                    color: page===k ? C.sageDeep : C.mid, cursor:"pointer",
                    borderBottom: page===k ? `2px solid ${C.salmon}` : "2px solid transparent",
                    paddingBottom:"2px", transition:"all 0.2s",
                  }}>{l}</span>
                ))}
                <Btn onClick={() => go("home")} bg={C.salmon} small>Scrivimi</Btn>
              </div>
            )}
            {mob && (
              <button onClick={() => setOpen(o => !o)} style={{ background:"none", border:"none", cursor:"pointer", padding:"6px", display:"flex", flexDirection:"column", gap:"5px" }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{ width:"22px", height:"2px", background:C.sageDeep, transform: open && i===0 ? "rotate(45deg) translate(5px,5px)" : open && i===1 ? "scaleX(0)" : open && i===2 ? "rotate(-45deg) translate(5px,-5px)" : "none", transition:"all 0.25s" }} />
                ))}
              </button>
            )}
          </div>
          {mob && open && (
            <div style={{ background:C.sage, borderTop:"1px solid rgba(255,255,255,0.18)" }}>
              {links.map(([k,l]) => (
                <div key={k} onClick={() => go(k)} style={{ padding:"1rem 1.5rem", fontSize:"0.88rem", fontWeight:600, color: page===k ? C.white : "rgba(255,255,255,0.82)", borderBottom:"1px solid rgba(255,255,255,0.1)", cursor:"pointer" }}>{l}</div>
              ))}
            </div>
          )}
        </nav>
      );
    }

    function Footer({ setPage }) {
      const mob = useIsMobile();
      return (
        <>
          <Wave fromColor={C.sageFog} toColor={C.sage} />
          <div style={{ background:C.sage, padding: mob ? "2rem 1.5rem" : "2.5rem 3rem" }}>
            <div style={{ display:"flex", flexDirection: mob ? "column" : "row", gap:"1.5rem", justifyContent:"space-between", alignItems: mob ? "flex-start" : "center" }}>
              <div style={{ fontFamily:"Georgia,serif", fontSize:"1rem", color:C.white, fontWeight:"bold" }}>
                Federica <span style={{ color:C.salmonPale, fontStyle:"italic" }}>Tardia</span>
                <div style={{ fontSize:"0.7rem", fontWeight:300, color:"rgba(255,255,255,0.5)", marginTop:"0.2rem" }}>Biologa Nutrizionista</div>
              </div>
              <div style={{ fontSize:"0.67rem", color:"rgba(255,255,255,0.35)" }}>© 2026 Federica Tardia</div>
            </div>
          </div>
        </>
      );
    }

    function HomePage({ setPage }) {
      const mob = useIsMobile();
      const go = (p) => { setPage(p); window.scrollTo(0,0); };

      return (
        <div className="fade-in">
          <div style={{ background:C.sage, padding: mob ? "3.5rem 1.5rem 5rem" : "5rem 3rem 6rem", position:"relative", overflow:"hidden" }}>
            <WaveDecor color={C.white} opacity={0.1} />
            <div style={{ display:"grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: mob ? "2.5rem" : "5rem", alignItems:"center", maxWidth:"1100px", margin:"0 auto", position:"relative", zIndex:2 }}>
              <div>
                <Tag text="Biologa Nutrizionista" light />
                <h1 style={{ fontFamily:"Georgia,serif", fontSize: mob ? "2.4rem" : "clamp(2.8rem,4vw,4rem)", fontWeight:"normal", lineHeight:1.08, color:C.white, margin:"0 0 1.4rem" }}>
                  Nutrizione<br/><em style={{ color:C.salmonPale }}>su misura</em><br/>per la tua vita.
                </h1>
                <p style={{ fontSize: mob ? "0.92rem" : "0.97rem", lineHeight:1.82, color:"rgba(255,255,255,0.78)", maxWidth:"420px", marginBottom:"2rem" }}>
                  Non diete rigide. Un approccio concreto, basato sulla scienza, che si adatta davvero al tuo stile di vita.
                </p>
                <div style={{ display:"flex", gap:"0.8rem", flexWrap:"wrap" }}>
                  <Btn bg={C.salmon} onClick={() => go("ebook")}>Scopri gli eBook →</Btn>
                  <Btn bg="rgba(255,255,255,0.18)" onClick={() => go("chi-sono")}>Chi sono</Btn>
                </div>
              </div>
            </div>
          </div>
          <Wave fromColor={C.sage} toColor={C.white} />
          
          <div style={{ padding: "4rem 1.5rem", textAlign:"center" }}>
            <Tag text="Servizi" />
            <h2 style={{ fontFamily:"Georgia,serif", fontSize: "2rem" }}>Le mie guide pratiche</h2>
            <div style={{ display:"grid", gridTemplateColumns: mob ? "1fr" : "repeat(4,1fr)", gap:"1rem", marginTop:"2rem" }}>
               {ebooks.slice(0,4).map(e => (
                 <div key={e.id} style={{ background:C.white, padding:"1.5rem", borderRadius:"16px", boxShadow:"0 4px 12px rgba(0,0,0,0.05)", borderTop:`4px solid ${e.accent}` }}>
                    <span style={{ fontSize:"2rem" }}>{e.emoji}</span>
                    <h4 style={{ margin:"0.5rem 0" }}>{e.title}</h4>
                    <p style={{ fontSize:"0.75rem", color:C.mid }}>{e.sub}</p>
                 </div>
               ))}
            </div>
          </div>
        </div>
      );
    }

    function ChiSonoPage() {
      return (
        <div className="fade-in" style={{ padding: "4rem 1.5rem", maxWidth:"800px", margin:"0 auto" }}>
          <Tag text="La mia storia" />
          <h1 style={{ fontFamily:"Georgia,serif", marginBottom:"2rem" }}>Dott.ssa Federica Tardia</h1>
          <p style={{ lineHeight:"1.8", color:C.mid }}>Sono una Biologa Nutrizionista specializzata in educazione alimentare. Credo che il cibo debba essere un alleato, non un nemico.</p>
        </div>
      );
    }

    function EbookPage() {
      const mob = useIsMobile();
      return (
        <div className="fade-in">
          <div style={{ background:C.sage, padding: mob ? "3rem 1.5rem" : "4.5rem 3rem", color:C.white }}>
            <Tag text="eBook & Risorse" light />
            <h1 style={{ fontFamily:"Georgia,serif", fontSize: "2.5rem" }}>Strumenti pratici per mangiare meglio</h1>
          </div>
          <Wave fromColor={C.sage} toColor={C.white} />
          <div style={{ padding: mob ? "2.5rem 1.5rem" : "3.5rem 3rem", display:"grid", gridTemplateColumns: mob ? "1fr" : "repeat(3,1fr)", gap:"1.5rem" }}>
            {ebooks.map(e => (
              <div key={e.id} style={{ border:`1px solid ${C.light}`, borderRadius:"16px", overflow:"hidden", transition:"0.3s" }}>
                <div style={{ background: e.bg, padding:"2.5rem", textAlign:"center", fontSize:"3rem" }}>{e.emoji}</div>
                <div style={{ padding:"1.5rem" }}>
                  <h3 style={{ marginBottom:"0.5rem" }}>{e.title}</h3>
                  <p style={{ fontSize:"0.85rem", color:C.mid, marginBottom:"1rem" }}>{e.desc}</p>
                  <div style={{ fontWeight:"bold", color:C.sageDeep, fontSize:"1.2rem" }}>{e.price}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState('home');
      return (
        <div>
          <Nav page={page} setPage={setPage} />
          <main style={{ minHeight:"70vh" }}>
            {page === 'home' && <HomePage setPage={setPage} />}
            {page === 'chi-sono' && <ChiSonoPage />}
            {page === 'ebook' && <EbookPage />}
            {page === 'blog' && <div className="fade-in" style={{padding:"5rem", textAlign:"center"}}><h2>Blog in arrivo...</h2></div>}
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
