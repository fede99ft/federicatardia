function useIsMobile() {
  const [mob, setMob] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

function Wave({ from, to }) {
  return (
    <div style={{ lineHeight:0, overflow:"hidden", background:from }}>
      <svg viewBox="0 0 1440 60" style={{ display:"block", width:"100%" }}>
        <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={to} />
      </svg>
    </div>
  );
}

function WaveLine({ color, w }) {
  return (
    <svg viewBox="0 0 200 12" style={{ display:"block", width:w||60, marginBottom:12 }}>
      <path d="M0,6 C20,0 40,12 60,6 C80,0 100,12 120,6 C140,0 160,12 180,6 C190,2 196,4 200,6" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function Tag({ text, light }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
      <WaveLine color={light ? "rgba(255,255,255,0.7)" : C.salmon} w={36} />

function Btn({ children, onClick, bg, color, full, sm }) {
  const [hov, setHov] = useState(false);
  const b = bg || C.sage;
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:"inline-flex", alignItems:"center", justifyContent:"center",
        padding: sm ? "0.55rem 1rem" : "0.85rem 1.6rem",
        fontSize: sm ? "0.65rem" : "0.72rem", fontWeight:700,
        letterSpacing:"0.09em", textTransform:"uppercase",
        border:"none", cursor:"pointer", borderRadius:100,
        background: hov ? b+"cc" : b, color: color||"#fff",
        width: full ? "100%" : undefined, transition:"all 0.2s" }}>
      {children}
    </button>
  );
}

      <div style={{background:C.sage,padding:mob?"3rem 1.5rem 5rem":"4.5rem 3rem 6rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-60,right:-60,width:260,height:260,borderRadius:"50%",border:"1px solid rgba(255,255,255,0.12)",pointerEvents:"none"}} />
        <Tag text="Blog" light />
        <h1 style={{fontFamily:"Georgia,serif",fontSize:mob?"2rem":"clamp(2.2rem,3.5vw,3.2rem)",fontWeight:"normal",color:C.white,lineHeight:1.1,marginBottom:"1.5rem"}}>
          Nutrizione spiegata<br/><em style={{color:C.salmonLight}}>semplicemente</em>
        </h1>
        <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
          {cats.map(c => (
            <button key={c} onClick={() => setActive(c)} style={{padding:"0.38rem 1rem",borderRadius:100,fontSize:"0.64rem",fontWeight:600,cursor:"pointer",border:"none",transition:"all 0.2s",background:active===c?C.salmon:"rgba(255,255,255,0.18)",color:active===c?C.white:"rgba(255,255,255,0.9)"}}>{c}</button>
          ))}
        </div>
      </div>
      <Wave from={C.sage} to={C.white} />
      <div style={{padding:mob?"2.5rem 1.5rem":"3.5rem 3rem",background:C.white}}>
        {featured && (
          <div onClick={() => { setArticle(featured); window.scrollTo(0,0); }} style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 2fr",gap:mob?"1.2rem":"2.5rem",background:C.sageFog,borderRadius:16,padding:mob?"1.5rem":"2.5rem",marginBottom:"2rem",cursor:"pointer",transition:"all 0.2s",border:"1px solid "+C.light}}
            onMouseEnter={e => e.currentTarget.style.boxShadow="0 14px 40px rgba(62,110,69,0.15)"}
            onMouseLeave={e => e.currentTarget.style.boxShadow="none"}>
            <div style={{background:"linear-gradient(135deg,"+C.sage+","+C.sageDark+")",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:mob?"3rem":"4rem",minHeight:mob?110:170}}>{featured.emoji}</div>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <span style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.salmon,marginBottom:"0.6rem"}}>✦ In evidenza · {featured.cat}</span>
              <h2 style={{fontFamily:"Georgia,serif",fontSize:mob?"1.3rem":"1.6rem",fontWeight:"bold",color:C.charcoal,marginBottom:"0.7rem",lineHeight:1.3}}>{featured.title}</h2>
              <p style={{fontSize:"0.85rem",lineHeight:1.7,color:C.mid,marginBottom:"0.8rem"}}>{featured.excerpt}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"0.67rem",color:C.mid}}>{featured.date} · {featured.read}</span>
                <span style={{fontSize:"0.72rem",fontWeight:700,color:C.salmon}}>Leggi l'articolo →</span>
              </div>
            </div>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:"1rem"}}>
          {rest.map((p,i) => (
            <div key={i} onClick={() => { setArticle(p); window.scrollTo(0,0); }} style={{border:"1px solid "+C.light,borderRadius:16,overflow:"hidden",cursor:"pointer",transition:"all 0.2s"}}
              onMouseEnter={e => { e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow="0 14px 36px rgba(0,0,0,0.08)"; e.currentTarget.style.borderColor="transparent"; }}
              onMouseLeave={e => { e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="none"; e.currentTarget.style.borderColor=C.light; }}>
              <div style={{background:C.sagePale,padding:"1.2rem",fontSize:"2rem",lineHeight:1}}>{p.emoji}</div>
              <div style={{padding:"1.2rem"}}>
                <span style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.salmon}}>{p.cat}</span>
                <h3 style={{fontFamily:"Georgia,serif",fontSize:"1rem",fontWeight:"bold",color:C.charcoal,margin:"0.5rem 0",lineHeight:1.35}}>{p.title}</h3>
                <p style={{fontSize:"0.78rem",color:C.mid,lineHeight:1.6,marginBottom:"0.8rem"}}>{p.excerpt}</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid "+C.light,paddingTop:"0.7rem"}}>
                  <span style={{fontSize:"0.65rem",color:C.mid}}>{p.date} · {p.read}</span>
                  <span style={{fontSize:"0.7rem",fontWeight:700,color:C.salmon}}>Leggi →</span>
                </div>
              </div>
            </div>
          ))}
        </div>
        {filtered.length===0 && <div style={{textAlign:"center",padding:"3rem",color:C.mid}}>Nessun articolo in questa categoria.</div>}
      </div>
    </div>
  );
}

        <WaveLine color={C.sageLight} w={80} />

        <div style={{ display:"flex", flexDirection:"column", gap:"1.2rem", marginBottom:"2.5rem" }}>

          <p style={{ fontSize:"0.92rem", color:"rgba(255,255,255,0.92)", lineHeight:1.7, marginBottom:"1.5rem" }}>Ricette, consigli pratici e contenuti esclusivi ogni settimana. Troviamoci su Instagram!</p>

function ArticleContent({ blocks }) {
  return (
    <div>
      {blocks.map((b, i) => {
        if (b.type === "intro") return <p key={i} style={{ fontSize:"1.05rem", lineHeight:1.85, color:"#5A6B5C", marginBottom:"1.5rem", fontStyle:"italic", borderLeft:"3px solid #8FBC94", paddingLeft:"1.2rem" }}>{b.text}</p>;
        if (b.type === "h2") return <h2 key={i} style={{ fontFamily:"Georgia,serif", fontSize:"1.35rem", fontWeight:"bold", color:"#1E4A28", margin:"2rem 0 0.8rem", paddingBottom:"0.5rem", borderBottom:"2px solid #D8EDD9" }}>{b.text}</h2>;
        if (b.type === "h3") return <h3 key={i} style={{ fontFamily:"Georgia,serif", fontSize:"1.1rem", fontWeight:"bold", color:"#3E6E45", margin:"1.5rem 0 0.6rem" }}>{b.text}</h3>;
        if (b.type === "p") return <p key={i} style={{ fontSize:"0.95rem", lineHeight:1.85, color:"#5A6B5C", marginBottom:"1rem" }}>{b.text}</p>;
        if (b.type === "quote") return (
          <div key={i} style={{ background:"#FDF0ED", borderLeft:"4px solid #E8836A", padding:"1rem 1.4rem", margin:"1.5rem 0", borderRadius:"0 8px 8px 0" }}>
            <p style={{ fontFamily:"Georgia,serif", fontSize:"1.05rem", fontStyle:"italic", color:"#C9604A", lineHeight:1.6, margin:0 }}>{b.text}</p>
          </div>
        );
        if (b.type === "bullets") return (
          <ul key={i} style={{ margin:"0.8rem 0 1rem 0", paddingLeft:0, listStyle:"none" }}>
            {b.items.map((item, j) => (
              <li key={j} style={{ display:"flex", gap:"0.7rem", alignItems:"flex-start", marginBottom:"0.6rem" }}>
                <span style={{ color:"#E8836A", fontWeight:700, flexShrink:0, marginTop:"0.15rem" }}>→</span>
                <span style={{ fontSize:"0.93rem", lineHeight:1.75, color:"#5A6B5C" }}>{item}</span>
              </li>
            ))}
          </ul>
        );
        return null;
      })}
    </div>
  );
}

function ArticlePage({ post, go }) {
  const mob = useIsMobile();
  return (
    <div>
      <div style={{ background:"#6B9E72", padding: mob?"3rem 1.5rem 5rem":"4rem 3rem 5rem", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-60, right:-60, width:260, height:260, borderRadius:"50%", border:"1px solid rgba(255,255,255,0.12)", pointerEvents:"none" }} />
        <div style={{ marginBottom:"1rem" }}>
          <span onClick={() => go("blog")} style={{ fontSize:"0.72rem", color:"rgba(255,255,255,0.8)", cursor:"pointer", display:"inline-flex", alignItems:"center", gap:"0.4rem" }}>← Torna al blog</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:"0.8rem", marginBottom:"1rem" }}>
          <span style={{ fontSize:"0.6rem", fontWeight:700, letterSpacing:"0.16em", textTransform:"uppercase", color:"rgba(255,255,255,0.8)" }}>{post.cat}</span>
          <span style={{ color:"rgba(255,255,255,0.4)" }}>·</span>
          <span style={{ fontSize:"0.6rem", color:"rgba(255,255,255,0.7)" }}>{post.date}</span>
          <span style={{ color:"rgba(255,255,255,0.4)" }}>·</span>
          <span style={{ fontSize:"0.6rem", color:"rgba(255,255,255,0.7)" }}>{post.read} lettura</span>
        </div>
        <h1 style={{ fontFamily:"Georgia,serif", fontSize: mob?"1.8rem":"clamp(2rem,3.5vw,2.8rem)", fontWeight:"normal", color:"#FFFFFF", lineHeight:1.15, maxWidth:680 }}>{post.title}</h1>
        <p style={{ fontSize:"0.95rem", color:"rgba(255,255,255,0.88)", lineHeight:1.7, maxWidth:580, marginTop:"0.8rem" }}>{post.excerpt}</p>
      </div>
      <Wave from="#6B9E72" to="#FFFFFF" />
      <div style={{ display:"grid", gridTemplateColumns: mob?"1fr":"2fr 1fr", gap: mob?"2rem":"4rem", padding: mob?"2rem 1.5rem":"3.5rem 3rem", background:"#FFFFFF", alignItems:"start" }}>
        <div>
          <ArticleContent blocks={post.content} />
          <div style={{ marginTop:"2.5rem", padding:"1.5rem", background:"#EAF3EB", borderRadius:16, border:"1px solid #DDEADD" }}>
            <div style={{ fontSize:"0.65rem", fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", color:"#3E6E45", marginBottom:"0.6rem" }}>Vuoi approfondire?</div>
            <div style={{ fontFamily:"Georgia,serif", fontSize:"1.1rem", fontWeight:"bold", color:"#1C1C1A", marginBottom:"0.4rem" }}>{post.ebookTitle}</div>
            <p style={{ fontSize:"0.85rem", color:"#5A6B5C", marginBottom:"1rem", lineHeight:1.6 }}>Scarica la guida completa su Payhip in formato PDF.</p>
            <button onClick={() => window.open(post.ebookLink,"_blank")} style={{ padding:"0.7rem 1.5rem", background:"#E8836A", color:"#fff", border:"none", borderRadius:100, fontSize:"0.72rem", fontWeight:700, letterSpacing:"0.09em", textTransform:"uppercase", cursor:"pointer" }}>Acquista l'eBook</button>
          </div>
        </div>
        {!mob && (
          <div style={{ position:"sticky", top:80 }}>
            <div style={{ background:"#EAF3EB", borderRadius:16, padding:"1.5rem", marginBottom:"1.2rem" }}>
              <div style={{ fontSize:"0.65rem", fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", color:"#3E6E45", marginBottom:"1rem" }}>Altri articoli</div>
              {POSTS.filter(p => p.id !== post.id).slice(0,3).map(p => (
                <div key={p.id} onClick={() => go("article-"+p.id)} style={{ cursor:"pointer", marginBottom:"1rem", paddingBottom:"1rem", borderBottom:"1px solid #DDEADD" }}>
                  <div style={{ fontSize:"1.5rem", marginBottom:"0.3rem" }}>{p.emoji}</div>
                  <div style={{ fontFamily:"Georgia,serif", fontSize:"0.88rem", fontWeight:"bold", color:"#1C1C1A", lineHeight:1.3 }}>{p.title}</div>
                  <div style={{ fontSize:"0.68rem", color:"#5A6B5C", marginTop:"0.25rem" }}>{p.date} · {p.read}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const go = (p) => { setPage(p); window.scrollTo(0,0); };
  const articlePages = {};
  POSTS.forEach(p => { articlePages["article-"+p.id] = <ArticlePage post={p} go={go}/>; });
  const pages = { "home":<HomePage go={go}/>, "chi-sono":<ChiSonoPage/>, "ebook":<EbookPage/>, "blog":<BlogPage/>, "contatti":<ContattiPage/>, ...articlePages };
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", background:C.cream }}>
      <Nav page={page} go={go} />
      <main style={{ flex:1 }}>{pages[page]||pages["home"]}</main>
      <Footer go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
