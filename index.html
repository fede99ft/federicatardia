function useIsMobile() {
  const [mob, setMob] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

function Wave({ fromColor, toColor, flip }) {
  return (
    <div style={{ display:"block", lineHeight:0, overflow:"hidden", transform: flip ? "scaleY(-1)" : "none", background: fromColor }}>
      <svg viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" style={{ display:"block", width:"100%" }}>
        <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={toColor} />
      </svg>
    </div>
  );
}

function WaveDecor({ color, opacity=0.12 }) {
  return (
    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" style={{ position:"absolute", bottom:0, left:0, right:0, width:"100%", pointerEvents:"none" }}>
      <path d="M0,40 C100,20 200,60 300,40 C400,20 500,60 600,40 L600,60 L0,60 Z" fill={color} fillOpacity={opacity} />
      <path d="M0,50 C150,30 300,70 450,50 C520,40 570,55 600,50 L600,60 L0,60 Z" fill={color} fillOpacity={opacity * 0.6} />
    </svg>
  );
}

function WaveLine({ color, style={} }) {
  return (
    <svg viewBox="0 0 200 12" xmlns="http://www.w3.org/2000/svg" style={{ display:"block", ...style }}>
      <path d="M0,6 C20,0 40,12 60,6 C80,0 100,12 120,6 C140,0 160,12 180,6 C190,2 196,4 200,6" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function Tag({ text, light }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:"0.7rem", marginBottom:"0.9rem" }}>
      <WaveLine color={light ? "rgba(255,255,255,0.55)" : C.salmon} style={{ width:"40px" }} />
      <span style={{ fontSize:"0.62rem", fontWeight:700, letterSpacing:"0.16em", textTransform:"uppercase", color: light ? "rgba(255,255,255,0.7)" : C.salmon }}>
        {text}
      </span>
    </div>
  );
}

function Btn({ children, onClick, bg, color="#fff", full, small }) {
  const [hov, setHov] = useState(false);
  const bgColor = bg || C.sage;
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        display:"inline-flex", alignItems:"center", justifyContent:"center", gap:"0.4rem",
        padding: small ? "0.6rem 1.1rem" : "0.85rem 1.7rem",
        fontSize: small ? "0.67rem" : "0.72rem", fontWeight:700,
        letterSpacing:"0.09em", textTransform:"uppercase",
        border:"none", cursor:"pointer", borderRadius:"100px",
        background: hov ? bgColor + "dd" : bgColor, color,
        width: full ? "100%" : undefined,
        transition:"all 0.2s",
        boxShadow: hov ? `0 6px 20px ${bgColor}55` : "none",
      }}>
      {children}
    </button>
  );
}

function Nav({ page, setPage }) {
  const mob = useIsMobile();
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => { setOpen(false); }, [page]);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 10);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);
  const go = (p) => { setPage(p); setOpen(false); window.scrollTo(0,0); };
  const links = [["home","Home"],["chi-sono","Chi sono"],["ebook","eBook"],["blog","Blog"],["contatti","Contatti"]];

  return (
    <nav style={{
      position:"sticky", top:0, zIndex:200,
      background: scrolled ? "rgba(255,255,255,0.97)" : "rgba(255,255,255,0.93)",
      backdropFilter:"blur(16px)",
      borderBottom:`1px solid ${scrolled ? C.light : "transparent"}`,
      transition:"all 0.3s",
    }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding: mob ? "0 1.2rem" : "0 2.5rem", height: mob ? "58px" : "64px" }}>
        <div onClick={() => go("home")} style={{ fontFamily:"Georgia,serif", fontSize: mob ? "1rem" : "1.12rem", fontWeight:"bold", color:C.sageDeep, cursor:"pointer" }}>
          Federica <span style={{ color:C.salmon, fontStyle:"italic" }}>Tardia</span>
        </div>
        {!mob && (
          <div style={{ display:"flex", gap:"2rem", alignItems:"center" }}>
            {links.map(([k,l]) => (
              <span key={k} onClick={() => go(k)} style={{
                fontSize:"0.71rem", fontWeight:600, letterSpacing:"0.09em", textTransform:"uppercase",
                color: page===k ? C.sageDeep : C.mid, cursor:"pointer",
                borderBottom: page===k ? `2px solid ${C.salmon}` : "2px solid transparent",
                paddingBottom:"2px", transition:"all 0.2s",
              }}>{l}</span>
            ))}
            <Btn onClick={() => go("contatti")} bg={C.salmon} small>Scrivimi</Btn>
          </div>
        )}
        {mob && (
          <button onClick={() => setOpen(o => !o)} style={{ background:"none", border:"none", cursor:"pointer", padding:"6px", display:"flex", flexDirection:"column", gap:"5px" }}>
            {[0,1,2].map(i => (
              <div key={i} style={{ width:"22px", height:"2px", background:C.sageDeep, transform: open && i===0 ? "rotate(45deg) translate(5px,5px)" : open && i===1 ? "scaleX(0)" : open && i===2 ? "rotate(-45deg) translate(5px,-5px)" : "none", transition:"all 0.25s" }} />
            ))}
          </button>
        )}
      </div>
      {mob && open && (
        <div style={{ background:C.sage, borderTop:"1px solid rgba(255,255,255,0.18)" }}>
          {links.map(([k,l]) => (
            <div key={k} onClick={() => go(k)} style={{ padding:"1rem 1.5rem", fontSize:"0.88rem", fontWeight:600, color: page===k ? C.white : "rgba(255,255,255,0.82)", borderBottom:"1px solid rgba(255,255,255,0.1)", cursor:"pointer", background: page===k ? "rgba(255,255,255,0.1)" : "none" }}>{l}</div>
          ))}
          <div style={{ padding:"1rem 1.5rem" }}><Btn onClick={() => go("contatti")} bg={C.salmon} full>Scrivimi</Btn></div>
        </div>
      )}
    </nav>
  );
}

            <div style={{ background:e.bg, padding:"2rem", textAlign:"center" }}>
              <span style={{ fontSize:"2.2rem" }}>{e.emoji}</span>
              <div style={{ color:C.white, fontWeight:"bold", marginTop:"0.5rem" }}>{e.title}</div>
            </div>
            <div style={{ padding:"1.3rem" }}>
              <div style={{ fontSize:"0.8rem", color:C.mid, marginBottom:"1rem" }}>{e.desc}</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:`1px solid ${C.light}`, paddingTop:"0.9rem" }}>
                <div style={{ fontWeight:"bold", fontSize:"1.2rem", color:C.sageDeep }}>{e.price}</div>
                <Btn bg={C.salmon} small>Acquista →</Btn>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BlogPage() {
  const mob = useIsMobile();
  return (
    <div>
      <div style={{ background:C.sage, padding: "4.5rem 3rem" }}>
        <Tag text="Blog" light />
        <h1 style={{ fontFamily:"Georgia,serif", fontSize: "2.5rem", color:C.white }}>Nutrizione spiegata <em style={{ color:C.salmonPale }}>semplicemente</em></h1>
      </div>
      <Wave fromColor={C.sage} toColor={C.white} />
      <div style={{ padding: "3rem", display:"grid", gridTemplateColumns: mob ? "1fr" : "repeat(3,1fr)", gap:"1.5rem" }}>
        {posts.map((p, i) => (
          <div key={i} style={{ border:`1px solid ${C.light}`, borderRadius:"16px", padding:"1.5rem" }}>
            <div style={{ fontSize:"2rem" }}>{p.emoji}</div>
            <h3 style={{ fontFamily:"Georgia,serif", margin:"0.5rem 0" }}>{p.title}</h3>
            <p style={{ fontSize:"0.85rem", color:C.mid }}>{p.excerpt}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function ContattiPage() {
  const [sent, setSent] = useState(false);
  return (
    <div style={{ padding: "5rem 3rem", textAlign:"center" }}>
      <Tag text="Contatti" />
      <h1 style={{ fontFamily:"Georgia,serif", fontSize:"2.5rem" }}>Parliamo di <em style={{ color:C.salmon }}>nutrizione</em></h1>
      <div style={{ maxWidth:"500px", margin:"2rem auto", background:C.sageFog, padding:"2rem", borderRadius:"20px" }}>
        {sent ? <h3>Messaggio inviato!</h3> : (
          <div style={{ display:"flex", flexDirection:"column", gap:"1rem" }}>
            <input placeholder="Nome" style={{ padding:"0.8rem", borderRadius:"8px", border:`1px solid ${C.light}` }} />
            <input placeholder="Email" style={{ padding:"0.8rem", borderRadius:"8px", border:`1px solid ${C.light}` }} />
            <textarea placeholder="Messaggio" rows={4} style={{ padding:"0.8rem", borderRadius:"8px", border:`1px solid ${C.light}` }} />
            <Btn onClick={() => setSent(true)} bg={C.salmon}>Invia</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  useEffect(() => { window.scrollTo(0,0); }, [page]);
  const pages = {
    home:       <HomePage setPage={setPage} />,
    "chi-sono": <ChiSonoPage />,
    ebook:      <EbookPage />,
    blog:       <BlogPage />,
    contatti:   <ContattiPage />,
  };
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", background:C.cream }}>
      <Nav page={page} setPage={setPage} />
      <main style={{ flex:1 }}>{pages[page] || pages.home}</main>
      <Footer setPage={setPage} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
