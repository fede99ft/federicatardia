<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Federica Tardia — Biologa Nutrizionista</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:Georgia,serif;background:#FAFAF7;color:#1C1C1A;overflow-x:hidden}
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Configurazione Colori
    const C = {
      sage:       "#8AAF8E",
      sageDark:   "#5E8A63",
      sageDeep:   "#3A6140",
      sageLight:  "#B5CDB8",
      sagePale:   "#EAF2EB",
      sageFog:    "#F3F8F3",
      salmon:     "#E8836A",
      salmonDark: "#C9604A",
      salmonLight:"#F4A99A",
      salmonPale: "#FDF0ED",
      salmonFog:  "#FEF7F5",
      cream:      "#FAFAF7",
      white:      "#FFFFFF",
      charcoal:   "#1C1C1A",
      mid:        "#5A6B5C",
      light:      "#DDEADD",
    };

    const ebooks = [
      { id:1, emoji:"🍱", title:"La Schischetta Perfetta", sub:"30 ricette · Meal prep", price:"€ 40", tag:"Bestseller", bg:`linear-gradient(135deg,#3A6140,#5E8A63)`, desc:"30 ricette bilanciate per il pranzo in ufficio.", accent:"#3A6140" },
      { id:2, emoji:"💪", title:"Nutrizione Sportiva", sub:"Guida completa", price:"€ 29", bg:`linear-gradient(135deg,${C.salmonDark},${C.salmon})`, desc:"Migliora le performance con la scienza.", accent:C.salmon },
      { id:3, emoji:"🏷️", title:"Etichette Alimentari", sub:"Guida pratica", price:"€ 19", bg:`linear-gradient(135deg,#5E8A63,${C.sage})`, desc:"Impara a leggere cosa compri davvero.", accent:C.sageDark },
      { id:4, emoji:"👶", title:"Svezzamento 0–12 mesi", sub:"Per i genitori", price:"€ 25", bg:`linear-gradient(135deg,#C96A7A,#E89AAA)`, desc:"Guida completa all'introduzione dei solidi.", accent:"#C96A7A" },
    ];

    const posts = [
      { emoji:"🥗", cat:"Meal prep", title:"Come organizzare il meal prep in 60 minuti", date:"12 Mar 2026", read:"5 min" },
      { emoji:"💪", cat:"Sport", title:"Proteine: quante ne servono davvero?", date:"5 Mar 2026", read:"4 min" },
    ];

    // Componenti Utility
    function useIsMobile() {
      const [mob, setMob] = useState(window.innerWidth < 768);
      useEffect(() => {
        const fn = () => setMob(window.innerWidth < 768);
        window.addEventListener("resize", fn);
        return () => window.removeEventListener("resize", fn);
      }, []);
      return mob;
    }

    function Wave({ fromColor, toColor, flip }) {
      return (
        <div style={{ display:"block", lineHeight:0, background: fromColor, transform: flip ? "scaleY(-1)" : "none" }}>
          <svg viewBox="0 0 1440 60" style={{ display:"block", width:"100%" }}>
            <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill={toColor} />
          </svg>
        </div>
      );
    }

    function WaveLine({ color, style={} }) {
      return (
        <svg viewBox="0 0 200 12" style={{ display:"block", ...style }}>
          <path d="M0,6 C20,0 40,12 60,6 C80,0 100,12 120,6 C140,0 160,12 180,6 C200,6" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>
        </svg>
      );
    }

    function Btn({ children, onClick, bg, color="#fff", full, small }) {
      return (
        <button onClick={onClick} style={{
          padding: small ? "0.6rem 1.1rem" : "0.85rem 1.7rem",
          fontSize: "0.72rem", fontWeight:700, textTransform:"uppercase",
          border:"none", cursor:"pointer", borderRadius:"100px",
          background: bg || C.sage, color, width: full ? "100%" : "auto",
          transition:"0.2s opacity"
        }} onMouseOver={e => e.target.style.opacity = 0.8} onMouseOut={e => e.target.style.opacity = 1}>
          {children}
        </button>
      );
    }

    // Navigazione
    function Nav({ page, setPage }) {
      const mob = useIsMobile();
      const go = (p) => { setPage(p); window.scrollTo(0,0); };
      return (
        <nav style={{ position:"sticky", top:0, zHost:200, background:"#fff", padding:"1rem 2rem", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.light}`, zIndex: 100 }}>
          <div onClick={() => go('home')} style={{ fontWeight:"bold", color:C.sageDeep, cursor:"pointer" }}>FEDERICA TARDIA</div>
          <div style={{ display:"flex", gap:"1.5rem" }}>
            <span onClick={() => go('home')} style={{ cursor:"pointer", fontSize:"0.8rem" }}>Home</span>
            <span onClick={() => go('ebook')} style={{ cursor:"pointer", fontSize:"0.8rem" }}>eBook</span>
          </div>
        </nav>
      );
    }

    // Pagine
    function HomePage({ setPage }) {
      const mob = useIsMobile();
      return (
        <div className="fade-in">
          <section style={{ background:C.sage, color:"#fff", padding: mob ? "4rem 1.5rem" : "6rem 3rem", textAlign:"center" }}>
            <h1 style={{ fontSize: mob ? "2.5rem" : "4rem", marginBottom:"1rem" }}>Nutrizione su misura</h1>
            <p style={{ marginBottom:"2rem" }}>Approccio scientifico per la tua salute quotidiana.</p>
            <Btn bg={C.salmon} onClick={() => setPage('ebook')}>Vedi gli eBook</Btn>
          </section>
          <Wave fromColor={C.sage} toColor={C.white} />
        </div>
      );
    }

    function EbookPage() {
      const mob = useIsMobile();
      return (
        <div className="fade-in" style={{ padding: "3rem 1.5rem" }}>
          <h2 style={{ textAlign:"center", marginBottom:"3rem", color:C.sageDeep }}>I miei eBook</h2>
          <div style={{ display:"grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap:"2rem", maxWidth:"1000px", margin:"0 auto" }}>
            {ebooks.map(e => (
              <div key={e.id} style={{ border:`1px solid ${C.light}`, borderRadius:"20px", overflow:"hidden", background:"#fff" }}>
                <div style={{ background: e.bg, padding:"2rem", textAlign:"center", fontSize:"3rem" }}>{e.emoji}</div>
                <div style={{ padding:"1.5rem" }}>
                  <h3 style={{ marginBottom:"0.5rem" }}>{e.title}</h3>
                  <p style={{ color:C.mid, fontSize:"0.9rem", marginBottom:"1rem" }}>{e.desc}</p>
                  <div style={{ fontWeight:"bold", color:C.salmon }}>{e.price}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // App Main
    function App() {
      const [page, setPage] = useState('home');
      return (
        <div>
          <Nav page={page} setPage={setPage} />
          {page === 'home' ? <HomePage setPage={setPage} /> : <EbookPage />}
          <footer style={{ padding:"2rem", textAlign:"center", background:C.sageFog, fontSize:"0.8rem", color:C.mid }}>
            © 2026 Federica Tardia — Biologa Nutrizionista
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
